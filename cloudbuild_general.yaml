steps:
# Adapters
#
# The adapter pulls in github.com/apache/arrow/go/v15 for Parquet support
# (see utils/parquet_supported.go). Compiling arrow/compute/internal/kernels
# alone needs ~3-4 GB of RAM, and the N1_HIGHCPU_32 worker only has ~28.8 GB.
# We chain Arrow-heavy compiles into waves via waitFor, capping at 3 concurrent
# Arrow-heavy builds per wave. 32-bit ARM (GOARCH=arm + GOARM=5) is the most
# memory-hungry of the targets -- the toolchain has to manage 32-bit pointers
# but still drives Arrow's same compute kernels -- so it runs in its own wave
# to keep headroom on the worker. The AIX build uses the parquet_unsupported.go
# stub and is not Arrow-heavy, so it stays alongside wave 1.
  - name: 'golang:1.25-bookworm'
    id: run-tests
    args: ['go', 'test', './...', '-v']

  # Wave 1: 3 Arrow-heavy cross-compiles + AIX stub
  - name: 'golang:1.25-bookworm'
    id: build-linux64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_linux_64', './containers/general']
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    id: build-win64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_windows_64.exe', './containers/general']
    env:
      - 'GOOS=windows'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    id: build-macos64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_macos_64', './containers/general']
    env:
      - 'GOOS=darwin'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    id: build-aixppc64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_aix_ppc64', './containers/general']
    env:
      - 'GOOS=aix'
      - 'GOARCH=ppc64'
    waitFor: ['run-tests']

  # Wave 2: 3 Arrow-heavy cross-compiles, after wave 1
  - name: 'golang:1.25-bookworm'
    id: build-macosarm64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_macos_arm64', './containers/general']
    env:
      - 'GOOS=darwin'
      - 'GOARCH=arm64'
    waitFor: ['build-linux64', 'build-win64', 'build-macos64']
  - name: 'golang:1.25-bookworm'
    id: build-linuxarm64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_linux_arm64', './containers/general']
    env:
      - 'GOOS=linux'
      - 'GOARCH=arm64'
    waitFor: ['build-linux64', 'build-win64', 'build-macos64']
  - name: 'golang:1.25-bookworm'
    id: build-solarisamd64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_solaris_amd64', './containers/general']
    env:
      - 'GOOS=solaris'
      - 'GOARCH=amd64'
    waitFor: ['build-linux64', 'build-win64', 'build-macos64']

  # Wave 3: 32-bit ARM is the most memory-hungry compile -- run alone.
  - name: 'golang:1.25-bookworm'
    id: build-linuxarm
    args: ['go', 'build', '-v', '-o', 'lc_adapter_linux_arm', './containers/general']
    env:
      - 'GOOS=linux'
      - 'GOARCH=arm'
      - 'GOARM=5'
    waitFor: ['build-macosarm64', 'build-linuxarm64', 'build-solarisamd64']

  # Wave 4: 3 Arrow-heavy cross-compiles, after wave 3
  - name: 'golang:1.25-bookworm'
    id: build-freebsdamd64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_freebsd_64', './containers/general']
    env:
      - 'GOOS=freebsd'
      - 'GOARCH=amd64'
    waitFor: ['build-linuxarm']
  - name: 'golang:1.25-bookworm'
    id: build-netbsdamd64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_netbsd_64', './containers/general']
    env:
      - 'GOOS=netbsd'
      - 'GOARCH=amd64'
    waitFor: ['build-linuxarm']
  - name: 'golang:1.25-bookworm'
    id: build-openbsdamd64
    args: ['go', 'build', '-v', '-o', 'lc_adapter_openbsd_64', './containers/general']
    env:
      - 'GOOS=openbsd'
      - 'GOARCH=amd64'
    waitFor: ['build-linuxarm']


# Connectivity Tester
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_linux_64', './containers/connectivity']
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_windows_64.exe', './containers/connectivity']
    env:
      - 'GOOS=windows'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_macos_64', './containers/connectivity']
    env:
      - 'GOOS=darwin'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_macos_arm64', './containers/connectivity']
    env:
      - 'GOOS=darwin'
      - 'GOARCH=arm64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_linux_arm', './containers/connectivity']
    env:
      - 'GOOS=linux'
      - 'GOARCH=arm'
      - 'GOARM=5'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_linux_arm64', './containers/connectivity']
    env:
      - 'GOOS=linux'
      - 'GOARCH=arm64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_solaris_amd64', './containers/general']
    env:
      - 'GOOS=solaris'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_aix_ppc64', './containers/connectivity']
    env:
      - 'GOOS=aix'
      - 'GOARCH=ppc64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_freebsd_64', './containers/connectivity']
    env:
      - 'GOOS=freebsd'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_netbsd_64', './containers/connectivity']
    env:
      - 'GOOS=netbsd'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
  - name: 'golang:1.25-bookworm'
    args: ['go', 'build', '-v', '-o', 'lc_connectivity_openbsd_64', './containers/connectivity']
    env:
      - 'GOOS=openbsd'
      - 'GOARCH=amd64'
    waitFor: ['run-tests']
options:
  machineType: 'N1_HIGHCPU_32'
timeout: 45m
